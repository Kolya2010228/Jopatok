name: Build and Release APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Setup Keystore
        id: keystore
        run: |
          base64 -d keystore.b64 > jopatok-release.jks
          echo "status=signed" >> $GITHUB_OUTPUT
          echo "Keystore decoded from repo"

      - name: Get Latest Release Tag
        id: latest_release
        run: |
          LATEST_TAG=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/releases/latest \
            | jq -r '.tag_name' 2>/dev/null || echo "0.0.0")
          if [ "$LATEST_TAG" = "null" ] || [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="0.0.0"
          fi
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "Latest tag: $LATEST_TAG"

      - name: Calculate Next Version
        id: next_version
        run: |
          LATEST="${{ steps.latest_release.outputs.latest_tag }}"
          if [[ "$LATEST" =~ ^[vV]?([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            MAJOR="${BASH_REMATCH[1]}"
            MINOR="${BASH_REMATCH[2]}"
            PATCH="${BASH_REMATCH[3]}"
            NEXT_PATCH=$((PATCH + 1))
            NEXT_VERSION="${MAJOR}.${MINOR}.${NEXT_PATCH}"
          else
            NEXT_VERSION="1.0.0"
          fi
          echo "next_version=$NEXT_VERSION" >> $GITHUB_OUTPUT
          echo "Next version: $NEXT_VERSION"

      - name: Build Release APK
        id: build
        run: |
          chmod +x gradlew
          if [ "${{ steps.keystore.outputs.status }}" = "signed" ]; then
            echo "Building SIGNED release..."
            ./gradlew assembleRelease --no-daemon \
              -PKEYSTORE_PATH=jopatok-release.jks \
              -PKEYSTORE_PASSWORD=JopatokRelease2026 \
              -PKEY_ALIAS=jopatok \
              -PKEY_PASSWORD=JopatokRelease2026
            # Find the signed APK
            APK_PATH=$(find app/build/outputs -name "*.apk" ! -name "*unsigned*" | head -1)
          else
            echo "Building UNSIGNED release..."
            ./gradlew assembleRelease --no-daemon
            APK_PATH=$(find app/build/outputs -name "*.apk" | head -1)
          fi
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "Found APK: $APK_PATH"
          ls -la "$APK_PATH" 2>/dev/null || echo "APK not found!"
          find app/build/outputs -name "*.apk" -exec ls -la {} \;

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: jopatok-release
          path: ${{ steps.build.outputs.apk_path }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.build.outputs.apk_path }}
          tag_name: ${{ steps.next_version.outputs.next_version }}
          name: Release ${{ steps.next_version.outputs.next_version }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
