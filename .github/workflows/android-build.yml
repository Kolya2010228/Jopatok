name: Build and Release APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Get Latest Release Tag
        id: latest_release
        run: |
          LATEST_TAG=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/releases/latest \
            | jq -r '.tag_name' 2>/dev/null || echo "0.0.0")
          if [ "$LATEST_TAG" = "null" ] || [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="0.0.0"
          fi
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT

      - name: Calculate Next Version
        id: next_version
        run: |
          LATEST="${{ steps.latest_release.outputs.latest_tag }}"
          if [[ "$LATEST" =~ ^[vV]?([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            MAJOR="${BASH_REMATCH[1]}"
            MINOR="${BASH_REMATCH[2]}"
            PATCH="${BASH_REMATCH[3]}"
            NEXT_PATCH=$((PATCH + 1))
            NEXT_VERSION="${MAJOR}.${MINOR}.${NEXT_PATCH}"
          else
            NEXT_VERSION="1.0.0"
          fi
          echo "next_version=$NEXT_VERSION" >> $GITHUB_OUTPUT

      - name: Build Release APK
        id: build
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --info 2>&1 | tee build_output.txt || {
            echo "::group::BUILD ERROR OUTPUT"
            echo "BUILD FAILED - full output:"
            cat build_output.txt | grep -i -A5 -E "error:|Error:|failed:|FAILED" | tail -200
            echo "::endgroup::"
            exit 1
          }
          APK_PATH=$(find app/build/outputs -name "*.apk" | head -1)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "Found APK: $APK_PATH"
          ls -la "$APK_PATH" 2>/dev/null

      - name: Sign APK
        run: |
          APK_PATH=$(find app/build/outputs -name "*.apk" | head -1)
          UNSIGNED_PATH="${APK_PATH}"
          SIGNED_PATH="${APK_PATH%.apk}-signed.apk"

          # Generate keystore if not exists
          if [ ! -f debug.keystore ]; then
            keytool -genkeypair -v \
              -keystore debug.keystore \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -alias debug \
              -storepass android -keypass android \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

          # Sign APK
          $ANDROID_SDK_ROOT/build-tools/*/apksigner sign \
            --ks debug.keystore \
            --ks-key-alias debug \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out "$SIGNED_PATH" \
            "$UNSIGNED_PATH"

          echo "APK signed: $SIGNED_PATH"
          ls -la "$SIGNED_PATH"

          # Update output to point to signed APK
          echo "apk_path=$SIGNED_PATH" >> $GITHUB_OUTPUT

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: jopatok-release
          path: ${{ steps.build.outputs.apk_path }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.build.outputs.apk_path }}
          tag_name: ${{ steps.next_version.outputs.next_version }}
          name: Release ${{ steps.next_version.outputs.next_version }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
